name: Prober Unit Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
    - 'prober/prober/**'
  pull_request:
    branches:
      - main
    paths:
    - 'prober/prober/**'

permissions:
  contents: read

jobs:
  prober-test:
    name: 'Prober test (${{ matrix.env }})'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: prod
            args: ""
          - env: staging
            args: "--staging"
    steps:
      - name: 'Checkout'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.work'
          check-latest: true

      - name: Build prober test
        run: go build -o prober-test ./prober/prober

      - name: Get test OIDC token
        run: |
          curl -o oidc-token.txt "https://storage.googleapis.com/sigstore-conformance-testing-token/untrusted-testing-token.txt"

      - name: Export OIDC token
        run: |
          echo "SIGSTORE_ID_TOKEN=$(cat ./oidc-token.txt)" >> $GITHUB_ENV

      - name: Run prober test
        id: prober-test
        run: ./prober-test --one-time --write-prober --logStyle dev ${{ matrix.args }}
