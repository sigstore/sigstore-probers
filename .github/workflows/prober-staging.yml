name: Staging Sigstore Prober

on:
  workflow_dispatch:
    inputs:
      trigger_pager_duty_test:
        description: 'Trigger PagerDuty as a test'
        required: false
        type: boolean
      rekor_v2_url:
        description: '(Optional) Rekor v2 URL'
        required: false
        type: string
      rekor_v2_public_key:
        description: '(Optional) Rekor v2 Public Key'
        required: false
        type: string
  schedule:
    # run every 15 minutes, as often as Github Actions allows
    - cron:  '0/15 * * * *'

permissions: {}

jobs:
  prober:
    name: Initial prober run
    uses: ./.github/workflows/reusable-prober.yml
    permissions:
      id-token: write
      contents: read
      packages: write
      issues: write
    secrets:
      PAGERDUTY_INTEGRATION_KEY: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
    with:
      enable_staging: true
      tuf_repo: "https://tuf-repo-cdn.sigstage.dev"
      tuf_root_path: ".github/assets/sigstage.root.json"
      alert_on_failure: false
      trigger_pager_duty_test: ${{ github.event.inputs.trigger_pager_duty_test }}
      rekor_v2_url: ${{ github.event.inputs.rekor_v2_url }}
      rekor_v2_public_key: ${{ github.event.inputs.rekor_v2_public_key }}

  wait-on-failure:
    name: Let GitHub take a breath before retrying prober
    needs: prober
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - run: sleep 30

  prober-with-alerts:
    name: Run prober after initial failure, alert on failure
    uses: ./.github/workflows/reusable-prober.yml
    needs: [prober, wait-on-failure]
    if: failure()
    permissions:
      id-token: write
      contents: read
      packages: write
      issues: write
    secrets:
      PAGERDUTY_INTEGRATION_KEY: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
    with:
      enable_staging: true
      tuf_repo: "https://tuf-repo-cdn.sigstage.dev"
      tuf_root_path: ".github/assets/sigstage.root.json"
      alert_on_failure: true
      trigger_pager_duty_test: ${{ github.event.inputs.trigger_pager_duty_test }}
      rekor_v2_url: ${{ github.event.inputs.rekor_v2_url }}
      rekor_v2_public_key: ${{ github.event.inputs.rekor_v2_public_key }}
